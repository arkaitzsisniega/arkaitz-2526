<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Movistar Inter · Datos</title>

<!-- Favicon (escritorio, Android, Chrome iOS) -->
<link rel="icon" type="image/png" sizes="512x512" href="inter_verde.png">
<link rel="icon" type="image/png" sizes="192x192" href="inter_verde.png">
<link rel="shortcut icon" href="inter_verde.png">

<!-- iOS / iPad / iPhone: icono al "Añadir a pantalla de inicio" -->
<link rel="apple-touch-icon" sizes="180x180" href="inter_verde.png">
<link rel="apple-touch-icon" href="inter_verde.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inter Datos">

<!-- Android / PWA manifest -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B5E20">

<style>
  html, body {
    margin: 0; padding: 0; min-height: 100vh; height: 100%;
    background: #0b0f0c;
    color: #e5e5e5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 20px;
    box-sizing: border-box;
  }
  img.escudo { width: 160px; height: auto; margin-bottom: 24px; }
  h1 { font-size: 1.3rem; font-weight: 700; margin: 0 0 12px 0; color: #ffffff; }
  p  { font-size: 0.95rem; opacity: 0.75; margin: 0 0 24px 0; max-width: 340px; line-height: 1.45; }
  a.btn {
    display: inline-block; padding: 14px 28px; border-radius: 999px;
    background: #10b981; color: #ffffff; font-weight: 700; font-size: 1rem;
    text-decoration: none; box-shadow: 0 4px 14px rgba(16,185,129,0.35);
  }
  a.btn:active { background: #059669; }
  .hint {
    margin-top: 28px; font-size: 0.8rem; opacity: 0.55; max-width: 320px;
    line-height: 1.5;
  }
  .hint b { color: #fde68a; }
  .loading { font-size: 0.9rem; opacity: 0.7; margin-top: 10px; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#10b981; margin:0 4px; animation: blink 1.2s infinite; }
  .dot:nth-child(2){ animation-delay: 0.2s; } .dot:nth-child(3){ animation-delay: 0.4s; }
  @keyframes blink { 0%,100%{opacity:0.3} 50%{opacity:1} }
</style>
</head>
<body>
  <img class="escudo" src="inter_verde.png" alt="Movistar Inter">
  <h1>Movistar Inter · Datos</h1>

  <div id="standalone-mode" class="loading" style="display:none;">
    Cargando panel<span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>

  <div id="browser-mode">
    <p>Panel del cuerpo técnico.<br>Pulsa el botón para entrar.</p>
    <a class="btn" id="abrir">Abrir panel ▶</a>
    <div class="hint">
      💡 Para tenerlo como app:<br>
      Pulsa <b>Compartir</b> (cuadrado con flecha) → <b>Añadir a pantalla de inicio</b>.
      Aparecerá el escudo del Inter como un icono más.
    </div>
  </div>

<script>
  const URL_PANEL = "https://interfs-datos.streamlit.app/";

  // Detectar si la página se abre desde el icono del escritorio (modo standalone).
  // - iOS: window.navigator.standalone === true
  // - Android/Chrome: matchMedia("(display-mode: standalone)").matches
  const esApp =
    (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) ||
    window.navigator.standalone === true;

  if (esApp) {
    // Abierto desde el icono → redirigir automáticamente.
    document.getElementById("browser-mode").style.display = "none";
    document.getElementById("standalone-mode").style.display = "block";
    setTimeout(function() {
      window.location.replace(URL_PANEL);
    }, 400);
  } else {
    // Abierto desde Safari/Chrome normal → mostrar botón.
    // Click → abrir el panel manteniendo la posibilidad de "Añadir a pantalla
    // de inicio" durante todo el rato que el usuario esté en esta página.
    document.getElementById("abrir").addEventListener("click", function(e) {
      e.preventDefault();
      window.location.href = URL_PANEL;
    });
  }
</script>
</body>
</html>
